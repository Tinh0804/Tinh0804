<svg xmlns="http://www.w3.org/2000/svg" width="1648" height="560" viewBox="0 0 1648 560" role="img" aria-labelledby="title desc">
  <title id="title">Lê Hoàng Quách Tỉnh — Backend Software Engineer</title>
  <desc id="desc">Dark technology profile banner with cyan and violet light, a system grid, and a live backend service panel.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#050816"/>
      <stop offset=".52" stop-color="#0a1024"/>
      <stop offset="1" stop-color="#111033"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#22d3ee"/>
      <stop offset=".52" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="cyanGlow">
      <stop stop-color="#22d3ee" stop-opacity=".28"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="violetGlow">
      <stop stop-color="#8b5cf6" stop-opacity=".26"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#94a3b8" stroke-opacity=".065"/>
    </pattern>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="170%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#020617" flood-opacity=".7"/>
    </filter>
    <clipPath id="frame"><rect width="1648" height="560" rx="30"/></clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="1648" height="560" fill="url(#bg)"/>
    <rect width="1648" height="560" fill="url(#grid)"/>
    <circle cx="70" cy="500" r="420" fill="url(#cyanGlow)"/>
    <circle cx="1510" cy="40" r="500" fill="url(#violetGlow)"/>
    <path d="M-50 510C280 360 420 610 760 445S1280 280 1710 390" fill="none" stroke="url(#accent)" stroke-opacity=".12" stroke-width="90"/>
    <path d="M-50 510C280 360 420 610 760 445S1280 280 1710 390" fill="none" stroke="url(#accent)" stroke-opacity=".32" stroke-width="2"/>

    <g transform="translate(64 32)">
      <rect width="272" height="42" rx="21" fill="#0f172a" stroke="#22d3ee" stroke-opacity=".42"/>
      <circle cx="24" cy="21" r="5" fill="#34d399" filter="url(#glow)">
        <animate attributeName="opacity" values=".45;1;.45" dur="2.4s" repeatCount="indefinite"/>
      </circle>
      <text x="42" y="27" fill="#cbd5e1" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="700" letter-spacing="2">AVAILABLE FOR IDEAS</text>
    </g>

    <g transform="translate(64 148)">
      <text fill="#f8fafc" font-family="Arial,Helvetica,sans-serif" font-size="70" font-weight="800" letter-spacing="-2">
        <tspan x="0" y="0">LÊ HOÀNG</tspan>
        <tspan x="0" y="82">QUÁCH TỈNH</tspan>
      </text>
      <rect y="197" width="650" height="5" rx="2.5" fill="url(#accent)"/>
      <text y="250" fill="#94a3b8" font-family="Arial,Helvetica,sans-serif" font-size="24" font-weight="600" letter-spacing="5">BACKEND SOFTWARE ENGINEER</text>
      <text y="304" fill="#64748b" font-family="Courier New,monospace" font-size="19">I turn complex requirements into reliable systems.</text>
      <g transform="translate(0 344)" font-family="Courier New,monospace" font-size="16" font-weight="700">
        <rect width="148" height="42" rx="12" fill="#22d3ee" fill-opacity=".1" stroke="#22d3ee" stroke-opacity=".35"/>
        <text x="74" y="27" text-anchor="middle" fill="#67e8f9">SPRING BOOT</text>
        <rect x="162" width="92" height="42" rx="12" fill="#a78bfa" fill-opacity=".1" stroke="#a78bfa" stroke-opacity=".35"/>
        <text x="208" y="27" text-anchor="middle" fill="#c4b5fd">.NET</text>
        <rect x="268" width="174" height="42" rx="12" fill="#38bdf8" fill-opacity=".1" stroke="#38bdf8" stroke-opacity=".35"/>
        <text x="355" y="27" text-anchor="middle" fill="#7dd3fc">MICROSERVICES</text>
      </g>
    </g>

    <g transform="translate(1018 74)" filter="url(#shadow)">
      <rect width="566" height="412" rx="24" fill="#0b1124" fill-opacity=".86" stroke="#94a3b8" stroke-opacity=".22"/>
      <path d="M0 58H566" stroke="#94a3b8" stroke-opacity=".16"/>
      <circle cx="28" cy="29" r="6" fill="#fb7185"/><circle cx="50" cy="29" r="6" fill="#fbbf24"/><circle cx="72" cy="29" r="6" fill="#34d399"/>
      <text x="283" y="35" text-anchor="middle" fill="#64748b" font-family="Courier New,monospace" font-size="13">system-overview.yml</text>
      <g font-family="Courier New,monospace" font-size="18">
        <text x="34" y="102" fill="#64748b">01</text><text x="78" y="102" fill="#c4b5fd">service:</text><text x="178" y="102" fill="#e2e8f0">profile-api</text>
        <text x="34" y="141" fill="#64748b">02</text><text x="78" y="141" fill="#c4b5fd">status:</text><text x="168" y="141" fill="#34d399">healthy</text>
        <text x="34" y="180" fill="#64748b">03</text><text x="78" y="180" fill="#c4b5fd">runtime:</text><text x="178" y="180" fill="#67e8f9">Java / .NET</text>
        <text x="34" y="219" fill="#64748b">04</text><text x="78" y="219" fill="#c4b5fd">focus:</text><text x="158" y="219" fill="#e2e8f0">scalable APIs</text>
      </g>
      <g transform="translate(34 270)">
        <rect width="498" height="106" rx="16" fill="#020617" stroke="#22d3ee" stroke-opacity=".18"/>
        <text x="22" y="30" fill="#64748b" font-family="Courier New,monospace" font-size="13">LIVE REQUESTS</text>
        <path d="M22 77L72 65 112 73 156 43 198 57 240 35 286 54 332 31 374 46 420 20 476 31" fill="none" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <animate attributeName="stroke-dasharray" values="0 800;800 0" dur="3.8s" repeatCount="indefinite"/>
        </path>
        <circle r="5" fill="#67e8f9" filter="url(#glow)">
          <animateMotion dur="3.8s" repeatCount="indefinite" path="M22 77L72 65 112 73 156 43 198 57 240 35 286 54 332 31 374 46 420 20 476 31"/>
        </circle>
      </g>
    </g>
  </g>
  <rect x="1" y="1" width="1646" height="558" rx="29" fill="none" stroke="#334155" stroke-opacity=".7" stroke-width="2"/>
</svg>
