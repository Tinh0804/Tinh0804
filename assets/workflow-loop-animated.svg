<svg xmlns="http://www.w3.org/2000/svg" width="1648" height="660" viewBox="0 0 1648 660" role="img" aria-labelledby="title desc">
  <title id="title">Backend delivery workflow</title>
  <desc id="desc">A dark premium workflow showing six connected phases from API design to optimization.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#050816"/><stop offset=".55" stop-color="#0a1024"/><stop offset="1" stop-color="#151035"/></linearGradient>
    <linearGradient id="accent"><stop stop-color="#22d3ee"/><stop offset=".5" stop-color="#38bdf8"/><stop offset="1" stop-color="#a78bfa"/></linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse"><path d="M42 0H0V42" fill="none" stroke="#94a3b8" stroke-opacity=".05"/></pattern>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shadow" x="-30%" y="-50%" width="160%" height="200%"><feDropShadow dy="12" stdDeviation="14" flood-color="#020617" flood-opacity=".7"/></filter>
    <clipPath id="clip"><rect width="1648" height="660" rx="30"/></clipPath>
  </defs>
  <g clip-path="url(#clip)">
    <rect width="1648" height="660" fill="url(#bg)"/>
    <rect width="1648" height="660" fill="url(#grid)"/>
    <circle cx="824" cy="340" r="430" fill="#38bdf8" fill-opacity=".035"/>

    <text x="62" y="76" fill="#f8fafc" font-family="Arial,Helvetica,sans-serif" font-size="40" font-weight="800">THE BACKEND DELIVERY LOOP</text>
    <text x="62" y="111" fill="#64748b" font-family="Courier New,monospace" font-size="15" letter-spacing="3">FROM REQUIREMENT TO RELIABLE RELEASE</text>
    <text x="1582" y="78" text-anchor="end" fill="#a78bfa" font-family="Courier New,monospace" font-size="17">ITERATE / LEARN / IMPROVE</text>

    <path id="route" d="M138 322H1510" fill="none" stroke="#334155" stroke-width="4"/>
    <path d="M138 322H1510" fill="none" stroke="url(#accent)" stroke-width="3" stroke-dasharray="18 24">
      <animate attributeName="stroke-dashoffset" values="42;0" dur="1.8s" repeatCount="indefinite"/>
    </path>
    <circle r="7" fill="#67e8f9" filter="url(#glow)">
      <animateMotion dur="7s" repeatCount="indefinite"><mpath href="#route"/></animateMotion>
    </circle>

    <g font-family="Arial,Helvetica,sans-serif" text-anchor="middle" filter="url(#shadow)">
      <g transform="translate(168 322)">
        <circle r="76" fill="#0b172b" stroke="#22d3ee" stroke-width="2"/><circle r="58" fill="none" stroke="#22d3ee" stroke-opacity=".18"/>
        <text y="-8" fill="#67e8f9" font-family="Courier New,monospace" font-size="16">01</text><text y="24" fill="#f8fafc" font-size="20" font-weight="800">DESIGN</text>
        <text y="106" fill="#64748b" font-size="15">API contract</text>
      </g>
      <g transform="translate(430 322)">
        <circle r="76" fill="#10152d" stroke="#38bdf8" stroke-width="2"/><circle r="58" fill="none" stroke="#38bdf8" stroke-opacity=".18"/>
        <text y="-8" fill="#7dd3fc" font-family="Courier New,monospace" font-size="16">02</text><text y="24" fill="#f8fafc" font-size="20" font-weight="800">BUILD</text>
        <text y="106" fill="#64748b" font-size="15">Service logic</text>
      </g>
      <g transform="translate(692 322)">
        <circle r="76" fill="#11142d" stroke="#818cf8" stroke-width="2"/><circle r="58" fill="none" stroke="#818cf8" stroke-opacity=".18"/>
        <text y="-8" fill="#a5b4fc" font-family="Courier New,monospace" font-size="16">03</text><text y="24" fill="#f8fafc" font-size="20" font-weight="800">TEST</text>
        <text y="106" fill="#64748b" font-size="15">Expected behavior</text>
      </g>
      <g transform="translate(954 322)">
        <circle r="76" fill="#15132f" stroke="#a78bfa" stroke-width="2"/><circle r="58" fill="none" stroke="#a78bfa" stroke-opacity=".18"/>
        <text y="-8" fill="#c4b5fd" font-family="Courier New,monospace" font-size="16">04</text><text y="24" fill="#f8fafc" font-size="20" font-weight="800">PACKAGE</text>
        <text y="106" fill="#64748b" font-size="15">Docker image</text>
      </g>
      <g transform="translate(1216 322)">
        <circle r="76" fill="#17132f" stroke="#c084fc" stroke-width="2"/><circle r="58" fill="none" stroke="#c084fc" stroke-opacity=".18"/>
        <text y="-8" fill="#d8b4fe" font-family="Courier New,monospace" font-size="16">05</text><text y="24" fill="#f8fafc" font-size="20" font-weight="800">DEPLOY</text>
        <text y="106" fill="#64748b" font-size="15">CI/CD pipeline</text>
      </g>
      <g transform="translate(1478 322)">
        <circle r="76" fill="#191330" stroke="#e879f9" stroke-width="2"/><circle r="58" fill="none" stroke="#e879f9" stroke-opacity=".18"/>
        <text y="-8" fill="#f0abfc" font-family="Courier New,monospace" font-size="16">06</text><text y="24" fill="#f8fafc" font-size="20" font-weight="800">OPTIMIZE</text>
        <text y="106" fill="#64748b" font-size="15">Real feedback</text>
      </g>
    </g>

    <g transform="translate(130 516)">
      <rect width="1388" height="78" rx="20" fill="#0b1124" fill-opacity=".88" stroke="#334155"/>
      <g font-family="Courier New,monospace" font-size="16" font-weight="700">
        <circle cx="32" cy="39" r="5" fill="#34d399"/><text x="50" y="45" fill="#cbd5e1">VALIDATE INPUT</text>
        <circle cx="358" cy="39" r="5" fill="#22d3ee"/><text x="376" y="45" fill="#cbd5e1">PROTECT DATA</text>
        <circle cx="678" cy="39" r="5" fill="#818cf8"/><text x="696" y="45" fill="#cbd5e1">FAIL PREDICTABLY</text>
        <circle cx="1044" cy="39" r="5" fill="#c084fc"/><text x="1062" y="45" fill="#cbd5e1">SHIP SAFELY</text>
      </g>
    </g>
  </g>
  <rect x="1" y="1" width="1646" height="658" rx="29" fill="none" stroke="#334155" stroke-opacity=".7" stroke-width="2"/>
</svg>
