<svg xmlns="http://www.w3.org/2000/svg" width="1648" height="900" viewBox="0 0 1648 900" role="img" aria-labelledby="title desc">
  <title id="title">Backend technology stack</title>
  <desc id="desc">A dark luminous system map connecting backend languages, frameworks, data stores, and delivery tools.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#050816"/><stop offset=".55" stop-color="#0b1228"/><stop offset="1" stop-color="#130e2e"/></linearGradient>
    <linearGradient id="accent"><stop stop-color="#22d3ee"/><stop offset="1" stop-color="#a78bfa"/></linearGradient>
    <radialGradient id="orb"><stop stop-color="#38bdf8" stop-opacity=".18"/><stop offset="1" stop-color="#38bdf8" stop-opacity="0"/></radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#94a3b8" stroke-opacity=".055"/></pattern>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shadow" x="-20%" y="-40%" width="140%" height="180%"><feDropShadow dy="12" stdDeviation="16" flood-color="#020617" flood-opacity=".65"/></filter>
    <clipPath id="clip"><rect width="1648" height="900" rx="30"/></clipPath>
  </defs>
  <g clip-path="url(#clip)">
    <rect width="1648" height="900" fill="url(#bg)"/>
    <rect width="1648" height="900" fill="url(#grid)"/>
    <circle cx="824" cy="460" r="650" fill="url(#orb)"/>
    <circle cx="1500" cy="70" r="420" fill="url(#orb)" opacity=".5"/>

    <text x="62" y="74" fill="#f8fafc" font-family="Arial,Helvetica,sans-serif" font-size="40" font-weight="800">BACKEND SYSTEM MAP</text>
    <text x="62" y="108" fill="#64748b" font-family="Courier New,monospace" font-size="15" letter-spacing="3">TOOLS CONNECTED BY PURPOSE — NOT HYPE</text>
    <g transform="translate(1390 52)">
      <rect width="194" height="46" rx="23" fill="#0f172a" stroke="#22d3ee" stroke-opacity=".35"/>
      <circle cx="23" cy="23" r="5" fill="#34d399" filter="url(#glow)"><animate attributeName="opacity" values=".4;1;.4" dur="2s" repeatCount="indefinite"/></circle>
      <text x="42" y="29" fill="#cbd5e1" font-family="Courier New,monospace" font-size="14">SYSTEM ONLINE</text>
    </g>

    <g fill="none" stroke="#38bdf8" stroke-opacity=".22" stroke-width="2">
      <path d="M388 260C500 260 500 360 640 360M388 462C500 462 500 400 640 400M388 664C500 664 500 440 640 440"/>
      <path d="M1008 360C1140 360 1130 260 1258 260M1008 400C1140 400 1130 462 1258 462M1008 440C1140 440 1130 664 1258 664"/>
    </g>
    <g fill="none" stroke="url(#accent)" stroke-width="3" stroke-linecap="round">
      <path d="M388 260C500 260 500 360 640 360" stroke-dasharray="10 20"><animate attributeName="stroke-dashoffset" values="30;0" dur="2s" repeatCount="indefinite"/></path>
      <path d="M1008 400C1140 400 1130 462 1258 462" stroke-dasharray="10 20"><animate attributeName="stroke-dashoffset" values="30;0" dur="2.4s" repeatCount="indefinite"/></path>
    </g>

    <g font-family="Arial,Helvetica,sans-serif" filter="url(#shadow)">
      <g transform="translate(64 170)">
        <rect width="324" height="180" rx="22" fill="#0b1224" fill-opacity=".88" stroke="#22d3ee" stroke-opacity=".28"/>
        <text x="28" y="38" fill="#64748b" font-family="Courier New,monospace" font-size="14">01 / LANGUAGES</text>
        <text x="28" y="98" fill="#f8fafc" font-size="34" font-weight="800">Java</text><text x="276" y="98" text-anchor="end" fill="#67e8f9" font-size="20">JVM</text>
        <path d="M28 124H296" stroke="#334155"/><text x="28" y="158" fill="#f8fafc" font-size="30" font-weight="800">C#</text><text x="276" y="158" text-anchor="end" fill="#c4b5fd" font-size="20">CLR</text>
      </g>
      <g transform="translate(64 372)">
        <rect width="324" height="180" rx="22" fill="#0b1224" fill-opacity=".88" stroke="#a78bfa" stroke-opacity=".28"/>
        <text x="28" y="38" fill="#64748b" font-family="Courier New,monospace" font-size="14">02 / FRAMEWORKS</text>
        <text x="28" y="98" fill="#f8fafc" font-size="31" font-weight="800">Spring Boot</text><circle cx="276" cy="88" r="8" fill="#4ade80"/>
        <path d="M28 124H296" stroke="#334155"/><text x="28" y="158" fill="#f8fafc" font-size="31" font-weight="800">.NET</text><circle cx="276" cy="148" r="8" fill="#a78bfa"/>
      </g>
      <g transform="translate(64 574)">
        <rect width="324" height="180" rx="22" fill="#0b1224" fill-opacity=".88" stroke="#38bdf8" stroke-opacity=".28"/>
        <text x="28" y="38" fill="#64748b" font-family="Courier New,monospace" font-size="14">03 / ARCHITECTURE</text>
        <text x="28" y="99" fill="#f8fafc" font-size="30" font-weight="800">REST APIs</text>
        <path d="M28 124H296" stroke="#334155"/><text x="28" y="158" fill="#f8fafc" font-size="25" font-weight="800">Microservices</text>
      </g>

      <g transform="translate(640 286)">
        <rect width="368" height="228" rx="32" fill="#0c1730" stroke="url(#accent)" stroke-width="2"/>
        <circle cx="184" cy="92" r="56" fill="#22d3ee" fill-opacity=".08" stroke="#22d3ee" stroke-opacity=".5"/>
        <circle cx="184" cy="92" r="38" fill="none" stroke="#67e8f9" stroke-dasharray="8 9">
          <animateTransform attributeName="transform" type="rotate" from="0 184 92" to="360 184 92" dur="12s" repeatCount="indefinite"/>
        </circle>
        <path d="M168 92h32M184 76v32" stroke="#67e8f9" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
        <text x="184" y="176" text-anchor="middle" fill="#f8fafc" font-size="28" font-weight="800">SERVICE CORE</text>
        <text x="184" y="204" text-anchor="middle" fill="#64748b" font-family="Courier New,monospace" font-size="14">secure · observable · scalable</text>
      </g>

      <g transform="translate(1258 170)">
        <rect width="326" height="180" rx="22" fill="#0b1224" fill-opacity=".88" stroke="#22d3ee" stroke-opacity=".28"/>
        <text x="28" y="38" fill="#64748b" font-family="Courier New,monospace" font-size="14">04 / DATA</text>
        <text x="28" y="88" fill="#f8fafc" font-size="25" font-weight="800">SQL Server</text><text x="298" y="88" text-anchor="end" fill="#67e8f9" font-size="16">SQL</text>
        <text x="28" y="125" fill="#f8fafc" font-size="25" font-weight="800">PostgreSQL</text><text x="298" y="125" text-anchor="end" fill="#67e8f9" font-size="16">SQL</text>
        <text x="28" y="162" fill="#f8fafc" font-size="25" font-weight="800">MongoDB</text><text x="298" y="162" text-anchor="end" fill="#4ade80" font-size="16">DOC</text>
      </g>
      <g transform="translate(1258 372)">
        <rect width="326" height="180" rx="22" fill="#0b1224" fill-opacity=".88" stroke="#a78bfa" stroke-opacity=".28"/>
        <text x="28" y="38" fill="#64748b" font-family="Courier New,monospace" font-size="14">05 / DELIVERY</text>
        <text x="28" y="91" fill="#f8fafc" font-size="27" font-weight="800">Docker</text><text x="298" y="91" text-anchor="end" fill="#38bdf8" font-size="18">CONTAINER</text>
        <path d="M28 118H298" stroke="#334155"/><text x="28" y="156" fill="#f8fafc" font-size="27" font-weight="800">Git + CI/CD</text>
      </g>
      <g transform="translate(1258 574)">
        <rect width="326" height="180" rx="22" fill="#0b1224" fill-opacity=".88" stroke="#38bdf8" stroke-opacity=".28"/>
        <text x="28" y="38" fill="#64748b" font-family="Courier New,monospace" font-size="14">06 / TOOLING</text>
        <text x="28" y="93" fill="#f8fafc" font-size="26" font-weight="800">Postman</text><text x="298" y="93" text-anchor="end" fill="#fb923c" font-size="16">TEST</text>
        <path d="M28 118H298" stroke="#334155"/><text x="28" y="156" fill="#f8fafc" font-size="26" font-weight="800">VS Code</text>
      </g>
    </g>

    <g transform="translate(520 796)">
      <rect width="608" height="58" rx="29" fill="#0f172a" stroke="#334155"/>
      <text x="304" y="37" text-anchor="middle" fill="#cbd5e1" font-family="Courier New,monospace" font-size="17" letter-spacing="2">BUILD SIMPLE  •  MEASURE  •  SCALE</text>
    </g>
  </g>
  <rect x="1" y="1" width="1646" height="898" rx="29" fill="none" stroke="#334155" stroke-opacity=".7" stroke-width="2"/>
</svg>
